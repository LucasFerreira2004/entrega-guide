version: "3.9"

services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres-guide-1
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: guidedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guidedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - guide-network

  backend:
    build:
      context: ./api-vagas-e-candidaturas
      dockerfile: docker/Dockerfile
    container_name: backend-guide-1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/guidedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345678
    ports:
      - "8080:8080"
    networks:
      - guide-network

  frontend:
    build:
      context: ./front-vagas-e-candidaturas
      dockerfile: Dockerfile
    container_name: frontend-guide-1
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - guide-network

networks:
  guide-network:
    driver: bridge

volumes:
  pgdata-dev:
    driver: local
